# Production overrides — used with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  auth-service:
    volumes: []
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

  ai-engine:
    volumes:
      - ./services/ai-engine/models:/app/models
      - ./services/ai-engine/data:/app/data
    environment:
      - INFLUX_HOST=influxdb
      - INFLUX_PORT=8086
      - INFLUX_DB=${INFLUXDB_DB:-factory_data}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434/v1}
      - LLM_MODEL=${LLM_MODEL:-gemma4:e2b}

  web-frontend:
    volumes: []
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_AUTH_URL=${NEXT_PUBLIC_AUTH_URL}
      - AI_ENGINE_URL=http://ai-engine:8000
      - AUTH_SERVICE_URL=http://auth-service:8001

  # No host port bindings for internal services — container DNS handles routing.
  # This avoids port-binding failures that break Docker network setup entirely.
  postgres:
    ports: []
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-iiot_users}
      - POSTGRES_USER=${POSTGRES_USER:-iiot_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  influxdb:
    ports: []
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB:-factory_data}
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER:-admin}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
      - INFLUXDB_HTTP_AUTH_ENABLED=false

  mosquitto:
    ports: []
