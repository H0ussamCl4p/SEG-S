name: Build & Push images to ACR

# Builds all service images on a GitHub-hosted runner and pushes them to Azure
# Container Registry. Used instead of `az acr build` because ACR Tasks are
# disabled on Azure for Students subscriptions. The heavy push happens over
# GitHub's network, not your local connection.
#
# Required repo secrets:
#   ACR_LOGIN_SERVER  - e.g. iiotacrxxxx.azurecr.io
#   ACR_USERNAME      - ACR admin username
#   ACR_PASSWORD      - ACR admin password
#
# Trigger manually (Actions tab → Run workflow) or via `gh workflow run`.
# Frontend public URLs are inputs so they can be set to the real Azure FQDNs.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'NEXT_PUBLIC_API_URL baked into the frontend'
        default: 'https://api.eneguardian.app'
        required: true
      auth_url:
        description: 'NEXT_PUBLIC_AUTH_URL baked into the frontend'
        default: 'https://auth.eneguardian.app'
        required: true
      image_tag:
        description: 'Image tag to push'
        default: 'latest'
        required: true
      service:
        description: 'Which image to build'
        default: 'all'
        required: true
        type: choice
        options: [all, mosquitto, auth-service, simulator, ai-engine, web-frontend]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACR: ${{ secrets.ACR_LOGIN_SERVER }}
      TAG: ${{ github.event.inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login "$ACR" -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build & push mosquitto
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'mosquitto' }}
        run: |
          docker build -t "$ACR/mosquitto:$TAG" ./infrastructure/mosquitto
          docker push "$ACR/mosquitto:$TAG"

      - name: Build & push auth-service
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'auth-service' }}
        run: |
          docker build -t "$ACR/auth-service:$TAG" ./services/auth-service
          docker push "$ACR/auth-service:$TAG"

      - name: Build & push simulator
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'simulator' }}
        run: |
          docker build -t "$ACR/simulator:$TAG" ./services/simulator
          docker push "$ACR/simulator:$TAG"

      - name: Build & push ai-engine
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'ai-engine' }}
        run: |
          docker build -t "$ACR/ai-engine:$TAG" ./services/ai-engine
          docker push "$ACR/ai-engine:$TAG"

      - name: Build & push web-frontend
        if: ${{ github.event.inputs.service == 'all' || github.event.inputs.service == 'web-frontend' }}
        run: |
          docker build -t "$ACR/web-frontend:$TAG" \
            --build-arg NEXT_PUBLIC_API_URL=${{ github.event.inputs.api_url }} \
            --build-arg NEXT_PUBLIC_AUTH_URL=${{ github.event.inputs.auth_url }} \
            ./services/web-frontend
          docker push "$ACR/web-frontend:$TAG"

      - name: Done
        run: echo "All images pushed to $ACR with tag $TAG"
