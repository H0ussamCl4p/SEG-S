events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream frontend {
        server 127.0.0.1:3001;
    }

    upstream ai_engine {
        server 127.0.0.1:8000;
    }

    upstream auth_service {
        server 127.0.0.1:8001;
    }

    # HTTP only — used for initial Let's Encrypt issuance.
    # Serves the ACME challenge from /var/www/certbot and redirects everything else to HTTPS.

    server {
        listen 80;
        server_name eneguardian.app www.eneguardian.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://eneguardian.app$request_uri;
        }
    }

    server {
        listen 80;
        server_name api.eneguardian.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://api.eneguardian.app$request_uri;
        }
    }

    server {
        listen 80;
        server_name auth.eneguardian.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://auth.eneguardian.app$request_uri;
        }
    }
}
