events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream frontend {
        server 127.0.0.1:3001;
    }

    upstream ai_engine {
        server 127.0.0.1:8000;
    }

    upstream auth_service {
        server 127.0.0.1:8001;
    }

    # =========================
    # HTTP (80) — ACME + Redirect
    # =========================

    server {
        listen 80;
        server_name eneguardian.app www.eneguardian.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://eneguardian.app$request_uri;
        }
    }

    server {
        listen 80;
        server_name api.eneguardian.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://api.eneguardian.app$request_uri;
        }
    }

    server {
        listen 80;
        server_name auth.eneguardian.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://auth.eneguardian.app$request_uri;
        }
    }

    # =========================
    # HTTPS (443)
    # =========================

    # Shared TLS settings (kept minimal; no external includes required)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server {
        listen 443 ssl http2;
        server_name eneguardian.app;

        ssl_certificate     /etc/letsencrypt/live/eneguardian.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/eneguardian.app/privkey.pem;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    server {
        listen 443 ssl http2;
        server_name www.eneguardian.app;

        ssl_certificate     /etc/letsencrypt/live/eneguardian.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/eneguardian.app/privkey.pem;

        return 301 https://eneguardian.app$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.eneguardian.app;

        ssl_certificate     /etc/letsencrypt/live/eneguardian.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/eneguardian.app/privkey.pem;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API routes are registered with the /api/ prefix in FastAPI.
        # proxy_read_timeout is generous because LLM inference can take time.
        location / {
            proxy_pass http://ai_engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }

    server {
        listen 443 ssl http2;
        server_name auth.eneguardian.app;

        ssl_certificate     /etc/letsencrypt/live/eneguardian.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/eneguardian.app/privkey.pem;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Auth routes are registered with the /auth/ prefix in FastAPI.
        location / {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
